name: Release Library

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_win:
        description: 'Build Windows package'
        required: false
        type: boolean
        default: true
      build_linux:
        description: 'Build Linux package'
        required: false
        type: boolean
        default: true

env:
  LIB_NAME: libhybrid-pq-cp-abe

jobs:
  build-release:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version and platform flags
        id: config
        run: |
          # Get version
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="dev"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"
          
          # Get platform flags (default: both if tag push, otherwise use inputs)
          if [[ "${{ github.event_name }}" == "push" ]]; then
            # Tag push: build both by default
            BUILD_WIN=true
            BUILD_LINUX=true
          else
            # workflow_dispatch: use inputs
            BUILD_WIN="${{ github.event.inputs.build_win }}"
            BUILD_LINUX="${{ github.event.inputs.build_linux }}"
          fi
          echo "build_win=${BUILD_WIN}" >> $GITHUB_OUTPUT
          echo "build_linux=${BUILD_LINUX}" >> $GITHUB_OUTPUT
          echo "Build Windows: ${BUILD_WIN}"
          echo "Build Linux: ${BUILD_LINUX}"

      # ========================================================================
      # Build Linux Package
      # ========================================================================
      - name: Prepare Linux package
        if: steps.config.outputs.build_linux == 'true'
        run: |
          VERSION="${{ steps.config.outputs.version }}"
          PACKAGE_NAME="${{ env.LIB_NAME }}_linux_x86_64_v${VERSION}"
          
          mkdir -p "${PACKAGE_NAME}/include"
          mkdir -p "${PACKAGE_NAME}/lib"
          
          # Copy header files
          cp src/cpp/include/hybrid-pq-cp-abe.h "${PACKAGE_NAME}/include/"
          cp -r src/cpp/include/rabe "${PACKAGE_NAME}/include/"
          
          # Copy ONLY libhybrid-pq-cp-abe libraries for Linux
          cp src/cpp/lib/dynamic/libhybrid-pq-cp-abe.so "${PACKAGE_NAME}/lib/" 2>/dev/null || true
          cp src/cpp/lib/static/libhybrid-pq-cp-abe.a "${PACKAGE_NAME}/lib/" 2>/dev/null || true
          
          # Create zip
          zip -r "${PACKAGE_NAME}.zip" "${PACKAGE_NAME}"
          
          echo "Created: ${PACKAGE_NAME}.zip"
          echo "Package contents:"
          unzip -l "${PACKAGE_NAME}.zip"

      # ========================================================================
      # Build Windows Package
      # ========================================================================
      - name: Prepare Windows package
        if: steps.config.outputs.build_win == 'true'
        run: |
          VERSION="${{ steps.config.outputs.version }}"
          PACKAGE_NAME="${{ env.LIB_NAME }}_win_x86_64_v${VERSION}"
          
          mkdir -p "${PACKAGE_NAME}/include"
          mkdir -p "${PACKAGE_NAME}/lib"
          
          # Copy header files
          cp src/cpp/include/hybrid-pq-cp-abe.h "${PACKAGE_NAME}/include/"
          cp -r src/cpp/include/rabe "${PACKAGE_NAME}/include/"
          
          # Copy ONLY libhybrid-pq-cp-abe libraries for Windows
          cp src/cpp/lib/dynamic/libhybrid-pq-cp-abe.dll "${PACKAGE_NAME}/lib/" 2>/dev/null || true
          cp src/cpp/lib/static/libhybrid-pq-cp-abe.lib "${PACKAGE_NAME}/lib/" 2>/dev/null || true
          
          # Create zip
          zip -r "${PACKAGE_NAME}.zip" "${PACKAGE_NAME}"
          
          echo "Created: ${PACKAGE_NAME}.zip"
          echo "Package contents:"
          unzip -l "${PACKAGE_NAME}.zip"

      # ========================================================================
      # Create GitHub Release
      # ========================================================================
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ${{ env.LIB_NAME }}_linux_x86_64_v${{ steps.config.outputs.version }}.zip
            ${{ env.LIB_NAME }}_win_x86_64_v${{ steps.config.outputs.version }}.zip
          fail_on_unmatched_files: false
          body: |
            # Hybrid PQ-CP-ABE Library for Windows/Linux - Version ${{ steps.config.outputs.version }}

            ## Overview
            - This release introduces an updated implementation of the CP-ABE AC17 (Ciphertext Policy Attribute-Based Encryption) scheme, now integrated with the AES-GCM-256 symmetric encryption algorithm AND **ML-DSA-87 Post-Quantum Signatures**. 
            - The main objective of this update is to combine the flexible access control of CP-ABE with the high-performance encryption of AES-GCM-256, and protect data integrity/authentication against quantum adversaries using `liboqs`.

            ## Key Features
            
            ### Post-Quantum Hybrid Encryption:
            - Seamlessly append `--pqc` to the CLI to encrypt data with AES-GCM, manage access with CP-ABE, and sign the ciphertext using quantum-safe ML-DSA-87 signatures.
            - Prevents tampering and ensures sender authenticity even against future quantum computers.

            ### Optimized Performance:
            - The AES-GCM-256 encryption ensures fast and secure encryption of large data files.
            - The AC17 scheme allows for more flexible encryption policies and fine-grained control over who can access the encrypted content.

            ### Ultimate Multi-OS Build:
            - A unified `tasks.json` automatically detects the OS and builds seamlessly on Windows (MSVC) or Linux (g++).

            ## Changes in This Release
            - Added **Post-Quantum Signatures** (ML-DSA-87 via `liboqs`).
            - Unified executable `main` supporting both standard mode and `--pqc` mode.
            - Renamed library to `libhybrid-pq-cp-abe` to reflect the new architecture.
            - Removed legacy CLI arguments and improved parsing.

            ## Download
            - **Linux**: `${{ env.LIB_NAME }}_linux_x86_64_v${{ steps.config.outputs.version }}.zip`
            - **Windows**: `${{ env.LIB_NAME }}_win_x86_64_v${{ steps.config.outputs.version }}.zip`
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          generate_release_notes: true
